<script>
  window.maplibreComponent = function (opts) {
    return {
      id: opts?.id || "map-" + Math.random().toString(36).slice(2),
      styleURL:
        opts?.styleURL || "https://tiles.openfreemap.org/styles/positron",
      center: Array.isArray(opts?.center) ? opts.center : [-77.5, 40.9],
      zoom: Number.isFinite(opts?.zoom) ? opts.zoom : 6,
      bounds: Array.isArray(opts?.bounds) ? opts.bounds : null,
      padding: Number.isFinite(opts?.padding) ? opts.padding : 24,
      minZoom: Number.isFinite(opts?.minZoom) ? opts.minZoom : 3,
      maxZoom: Number.isFinite(opts?.maxZoom) ? opts.maxZoom : 20,
      bearing: Number.isFinite(opts?.bearing) ? opts.bearing : 0,
      pitch: Number.isFinite(opts?.pitch) ? opts.pitch : 0,
      controls: Array.isArray(opts?.controls) ? opts.controls : ["navigation"],
      navigationPosition: typeof opts?.navigationPosition === "string" ? opts.navigationPosition : "top-left",
      attributionCompact: opts?.attributionCompact ?? true,
      markers: Array.isArray(opts?.markers) ? opts.markers : [],

      map: null,
      _io: null,
      _ro: null,
      _initializing: false,
      _flyToHandler: null,
      _mobileViewHandler: null,
      _zoomToMarkerHandler: null,
      _restoreMapHandler: null,
      _markerInstances: [],
      _baseMarkerInstances: [],
      _savedMapState: null,
      _allMarkers: [],

      init() {
        const el = this.$refs.canvas;
        if (!el) {
          console.error("Map canvas element not found");
          return;
        }

        this._io = new IntersectionObserver(
          (entries) => {
            if (entries.some((e) => e.isIntersecting)) this.tryInit();
          },
          { root: null, threshold: 0 },
        );

        this._ro = new ResizeObserver(() => this.tryInit());

        this._io.observe(el);
        this._ro.observe(el);

        this._mobileViewHandler = (e) => {
          const view = e.detail?.view;
          if (view === "map") {
            if (this.map) {
              this.map.resize();
              const m = window.__inspectionsMarkers;
              if (Array.isArray(m) && m.length) this.updateMarkers(m);
            } else {
              this.tryInit(true);
            }
          }
        };
        window.addEventListener("mobile-view-changed", this._mobileViewHandler);

        this._flyToHandler = (e) => {
          const { lon, lat, zoom } = e.detail || {};
          if (typeof lon === "number" && typeof lat === "number" && this.map) {
            this.map.flyTo({
              center: [lon, lat],
              zoom: zoom ?? Math.max(this.map.getZoom(), 12),
              speed: 0.7,
            });
          }
        };
        window.addEventListener("inspections:flyTo", this._flyToHandler);

        this._zoomToMarkerHandler = (e) => {
          const { lat, lon } = e.detail || {};
          if (typeof lat !== "number" || typeof lon !== "number" || !this.map) return;

          try {
            this.map
              .getContainer()
              .querySelectorAll(".maplibregl-popup")
              .forEach((el) => el.remove());
          } catch {}

          this._savedMapState = {
            center: this.map.getCenter().toArray(),
            zoom: this.map.getZoom(),
            bearing: this.map.getBearing(),
            pitch: this.map.getPitch(),
          };

          this._allMarkers = [...this._markerInstances];

          this._markerInstances.forEach((m) => m.remove());
          this._markerInstances = [];

          const matchingMarker = window.__inspectionsMarkers?.find(
            (m) =>
              Math.abs(m.lat - lat) < 0.0001 &&
              Math.abs(m.lon - lon) < 0.0001,
          );

          if (matchingMarker) {
            const markerEl = this._createMarkerElement(matchingMarker);
            const marker = new maplibregl.Marker({
              element: markerEl,
              anchor: "bottom",
            }).setLngLat([lon, lat]);

            if (matchingMarker.popupHTML) {
              const popup = new maplibregl.Popup({
                closeButton: false,
                closeOnClick: false,
                offset: 25,
              }).setHTML(matchingMarker.popupHTML);

              markerEl.addEventListener("mouseenter", () => {
                try {
                  this.map
                    .getContainer()
                    .querySelectorAll(".maplibregl-popup")
                    .forEach((el) => el.remove());
                } catch {}
                popup.setLngLat([lon, lat]).addTo(this.map);
              });

              markerEl.addEventListener("mouseleave", () => {
                popup.remove();
                try {
                  this.map
                    .getContainer()
                    .querySelectorAll(".maplibregl-popup")
                    .forEach((el) => el.remove());
                } catch {}
              });
            }

            marker.addTo(this.map);
            this._markerInstances.push(marker);
          }

          this.map.flyTo({
            center: [lon, lat],
            zoom: 14,
            speed: 0.8,
            curve: 1.42,
          });
        };
        window.addEventListener("map:zoomToMarker", this._zoomToMarkerHandler);

        this._restoreMapHandler = () => {
          if (!this.map || !this._savedMapState) return;

          try {
            this.map
              .getContainer()
              .querySelectorAll(".maplibregl-popup")
              .forEach((el) => el.remove());
          } catch {}

          this.map.flyTo({
            center: this._savedMapState.center,
            zoom: this._savedMapState.zoom,
            bearing: this._savedMapState.bearing,
            pitch: this._savedMapState.pitch,
            speed: 0.8,
            curve: 1.42,
          });

          setTimeout(() => {
            try {
              this.map
                .getContainer()
                .querySelectorAll(".maplibregl-popup")
                .forEach((el) => el.remove());
            } catch {}

            const latest = window.__inspectionsMarkers;
            if (Array.isArray(latest) && latest.length) {
              this.updateMarkers(latest);
            }
            this._savedMapState = null;
          }, 500);
        };
        window.addEventListener("map:restoreView", this._restoreMapHandler);

        window.addEventListener("update-map-markers", (e) => {
          const markers = e.detail?.markers;
          if (markers) {
            this.updateMarkers(markers);
          }
        });

        this.tryInit();
      },

      hasSize() {
        const el = this.$refs.canvas;
        if (!el) return false;
        const rect = el.getBoundingClientRect();
        return rect.width > 0 && rect.height > 0;
      },

      tryInit(force = false) {
        if (this.map || this._initializing) return;
        const el = this.$refs.canvas;
        if (!el) return;

        if (!this.hasSize() && !force) return;

        if (!window.maplibregl) {
          setTimeout(() => this.tryInit(force), 50);
          return;
        }

        this._initializing = true;
        this.initMap();
        this._initializing = false;
      },

      _createMarkerElement(m = {}) {
        const color = m.color || "#c0392b";
        const size = Number.isFinite(m.size) ? m.size : 40; // px
        const isNoViolation = color === "#1b998b";
        
        const markerEl = document.createElement("div");
        markerEl.className = "cursor-pointer";
        markerEl.style.width = `${size}px`;
        markerEl.style.height = `${size}px`;
        markerEl.style.transform = "translateY(-2px)";
        
        if (isNoViolation) {
          markerEl.innerHTML = `
            <svg width="${size}" height="${size}" viewBox="0 0 24 24" aria-hidden="true">
              <defs>
                <filter id="markerShadow" x="-50%" y="-50%" width="200%" height="200%">
                  <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.25"/>
                </filter>
              </defs>
              <g filter="url(#markerShadow)">
                <circle cx="12" cy="12" r="10" fill="${color}" stroke="#ffffff" stroke-width="2"/>
                <path
                  d="M9 12l2 2 4-4"
                  stroke="#ffffff"
                  stroke-width="2.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  fill="none"
                />
              </g>
            </svg>
          `;
        } else {
          markerEl.innerHTML = `
            <svg width="${size}" height="${size}" viewBox="0 0 24 24" aria-hidden="true">
              <defs>
                <filter id="markerShadow" x="-50%" y="-50%" width="200%" height="200%">
                  <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.25"/>
                </filter>
              </defs>
              <g filter="url(#markerShadow)">
                <path
                  d="M12 2L2 20h20L12 2z"
                  fill="${color}"
                  stroke="#ffffff"
                  stroke-width="2"
                />
                <line
                  x1="12"
                  y1="9"
                  x2="12"
                  y2="14"
                  stroke="#ffffff"
                  stroke-width="2.5"
                  stroke-linecap="round"
                />
                <circle
                  cx="12"
                  cy="17"
                  r="1.25"
                  fill="#ffffff"
                />
              </g>
            </svg>
          `;
        }
        
        return markerEl;
      },

      initMap() {
        const el = this.$refs.canvas;
        if (!el) return;

        try {
          this.map = new maplibregl.Map({
            container: el,
            style: this.styleURL,
            center: this.center,
            zoom: this.zoom,
            bearing: this.bearing,
            pitch: this.pitch,
            minZoom: this.minZoom,
            maxZoom: this.maxZoom,
            attributionControl: false,
            cooperativeGestures: true,
          });

          if (this.controls.includes("navigation")) {
            const nav = new maplibregl.NavigationControl({
              showCompass: false,
              showZoom: true,
              visualizePitch: false,
            });
            this.map.addControl(nav, this.navigationPosition);
          }
          if (this.controls.includes("fullscreen")) {
            this.map.addControl(
              new maplibregl.FullscreenControl(),
              "top-right",
            );
          }
          this.map.addControl(
            new maplibregl.AttributionControl({
              compact: this.attributionCompact,
            }),
          );

          this.map.on("load", () => {
            if (this.bounds) {
              this.map.fitBounds(this.bounds, { padding: this.padding });
            }
            this.addMarkers();

            try {
              if (this.map.getLayer("state-borders"))
                this.map.removeLayer("state-borders");

              const boundaryLayer = this.map
                .getStyle()
                .layers.find((l) => l["source-layer"] === "boundary");
              const boundarySourceId = boundaryLayer?.source;
              if (boundarySourceId) {
                const beforeId = this.map
                  .getStyle()
                  .layers.find((l) => l.type === "symbol")?.id;

                this.map.addLayer(
                  {
                    id: "state-borders",
                    type: "line",
                    source: boundarySourceId,
                    "source-layer": "boundary",
                    filter: ["==", ["get", "admin_level"], 4],
                    layout: { "line-cap": "round", "line-join": "round" },
                    paint: {
                      "line-color": "#A9B3BD",
                      "line-opacity": 1,
                      "line-blur": 0,
                      "line-width": [
                        "interpolate",
                        ["exponential", 1.3],
                        ["zoom"],
                        3,
                        1.0,
                        8,
                        2.1,
                        12,
                        3.6,
                        22,
                        8.2,
                      ],
                      "line-dasharray": [4, 2],
                    },
                  },
                  beforeId,
                );
              } else {
                console.warn(
                  "Couldn't find 'boundary' source-layer; skipping border styling.",
                );
              }
            } catch (err) {
              console.error("Failed to add styled borders:", err);
            }

            const latest = window.__inspectionsMarkers;
            if (Array.isArray(latest) && latest.length) {
              this.updateMarkers(latest);
            }
          });

          this.map.on("error", (e) => {
            console.error("Map error:", e);
          });

          const ro = new ResizeObserver(() => this.map && this.map.resize());
          ro.observe(el);
          this._ro = ro;
        } catch (err) {
          console.error("MapLibre initialization error:", err);
        }
      },

      addMarkers() {
        if (!this.map) return;

        (this.markers || []).forEach((m) => {
          if (typeof m?.lon !== "number" || typeof m?.lat !== "number") return;

          const markerEl = this._createMarkerElement(m);
          const marker = new maplibregl.Marker({
            element: markerEl,
            anchor: "bottom",
          }).setLngLat([m.lon, m.lat]);

          let popup = null;
          if (m.popupHTML) {
            popup = new maplibregl.Popup({
              closeButton: false,
              closeOnClick: false,
              offset: 25,
            }).setHTML(m.popupHTML);

            markerEl.addEventListener("mouseenter", () => {
              popup.setLngLat([m.lon, m.lat]).addTo(this.map);
            });

            markerEl.addEventListener("mouseleave", () => {
              popup.remove();
            });
          }

          if (m.inspectionId) {
            markerEl.addEventListener("click", () => {
              window.dispatchEvent(
                new CustomEvent("marker-click", {
                  detail: { id: m.inspectionId },
                }),
              );
            });
          }

          marker.addTo(this.map);
          this._baseMarkerInstances.push(marker);
        });
      },

      updateMarkers(newMarkers) {
        if (!this.map || !Array.isArray(newMarkers)) return;

        if (this._markerInstances) {
          this._markerInstances.forEach((m) => m.remove());
        }
        this._markerInstances = [];

        newMarkers.forEach((m) => {
          if (typeof m?.lon !== "number" || typeof m?.lat !== "number") return;

          const markerEl = this._createMarkerElement(m);
          const marker = new maplibregl.Marker({
            element: markerEl,
            anchor: "bottom",
          }).setLngLat([m.lon, m.lat]);

          let popup = null;
          if (m.popupHTML) {
            popup = new maplibregl.Popup({
              closeButton: false,
              closeOnClick: false,
              offset: 25,
            }).setHTML(m.popupHTML);

            markerEl.addEventListener("mouseenter", () => {
              popup.setLngLat([m.lon, m.lat]).addTo(this.map);
            });

            markerEl.addEventListener("mouseleave", () => {
              popup.remove();
            });
          }

          if (m.inspectionId) {
            markerEl.addEventListener("click", () => {
              window.dispatchEvent(
                new CustomEvent("marker-click", {
                  detail: { id: m.inspectionId },
                }),
              );
            });
          }

          marker.addTo(this.map);
          this._markerInstances.push(marker);
        });

        if (newMarkers.length > 0) {
          const bounds = new maplibregl.LngLatBounds();
          newMarkers.forEach((m) => {
            if (typeof m?.lon === "number" && typeof m?.lat === "number") {
              bounds.extend([m.lon, m.lat]);
            }
          });
          this.map.fitBounds(bounds, {
            padding: this.padding,
            maxZoom: 12,
            duration: 1000,
          });
        }
      },

      destroy() {
        try {
          this._io?.disconnect();
        } catch {}
        try {
          this._ro?.disconnect();
        } catch {}
        if (this._flyToHandler) {
          window.removeEventListener("inspections:flyTo", this._flyToHandler);
        }
        if (this._mobileViewHandler) {
          window.removeEventListener(
            "mobile-view-changed",
            this._mobileViewHandler,
          );
        }
        if (this._zoomToMarkerHandler) {
          window.removeEventListener(
            "map:zoomToMarker",
            this._zoomToMarkerHandler,
          );
        }
        if (this._restoreMapHandler) {
          window.removeEventListener(
            "map:restoreView",
            this._restoreMapHandler,
          );
        }
        if (this._markerInstances) {
          this._markerInstances.forEach((m) => m.remove());
        }
        if (this._baseMarkerInstances) {
          this._baseMarkerInstances.forEach((m) => m.remove());
        }
        try {
          this.map?.remove();
        } catch {}
      },
    };
  };
</script>
